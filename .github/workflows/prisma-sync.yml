name: 🏛️ Prisma Database Sync

on:
  push:
    branches:
      - main  # 🚀 Fires whenever you push to your main branch
    paths:
      - 'prisma/schema.prisma'
      - 'prisma.config.ts'
      - '.github/workflows/prisma-sync.yml'

jobs:
  db-sync:
    name: 🔄 Synchronize Database
    runs-on: ubuntu-latest
    
    # 🛡️ Prevents multiple pushes from clashing on the database
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🛠️ Install Dependencies
        run: npm install

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🚀 Push Schema to Database
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
